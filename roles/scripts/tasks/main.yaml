- name: Create scripts directory
  ansible.builtin.file:
    path: "{{ workspace_location }}/{{ item }}"
    state: directory
  with_items: []

- name: Copy scripts files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ workspace_location }}/{{ item }}"
  with_items:
    - git-branch-clean.sh
    - eks-login.sh

- name: Initialize .git-branch-clean-ignore if absent
  ansible.builtin.copy:
    src: .git-branch-clean-ignore
    dest: "{{ workspace_location }}/.git-branch-clean-ignore"
    force: no
