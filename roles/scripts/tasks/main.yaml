- name: Create vscode directory
  ansible.builtin.file:
    path: "{{ workspace_location }}/{{ item }}"
    state: directory
  with_items:
    - .vscode

- name: Copy scripts files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ workspace_location }}/{{ item }}"
    force: no
  with_items:
    - git-branch-clean.sh
    - .git-branch-clean-ignore
