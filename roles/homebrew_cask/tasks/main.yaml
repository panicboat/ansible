- name: upgrade all casks
  community.general.homebrew_cask:
    upgrade_all: true
  ignore_errors: true

- name: define homebrew cask taps
  ansible.builtin.set_fact:
    homebrew_cask_taps:
      - name: aurorascharff/clicklight
        url: https://github.com/aurorascharff/ClickLight
      - name: manaflow-ai/cmux
      - name: fujibee/agmsg

- name: add homebrew cask taps
  community.general.homebrew_tap:
    name: "{{ item.name }}"
    url: "{{ item.url | default(omit) }}"
  loop: "{{ homebrew_cask_taps }}"

- name: trust homebrew cask taps
  ansible.builtin.command:
    cmd: "brew trust --tap {{ item.name }}"
  loop: "{{ homebrew_cask_taps }}"
  # register: brew_trust_check
  # changed_when: "'Trusted' in brew_trust_check.stdout or brew_trust_check.rc == 0"

  # https://formulae.brew.sh/cask/
- name: install homebrew cask packages
  community.general.homebrew_cask:
    name:
      - 1password
      - agmsg
      - antigravity-cli
      # - brave-browser
      - claude
      - claude-code
      - aurorascharff/clicklight/clicklight
      - clipy
      - cmux
      - codex
      - github
      # - google-chrome
      - google-cloud-sdk
      # - logi-options+
      - raycast
      - slack
      - visual-studio-code
    # auto_updates cask (browsers etc.) drifts from Homebrew's records via
    # the app's built-in updater; adopt reconciles instead of failing.
    install_options:
      - adopt

- name: uninstall homebrew cask packages
  community.general.homebrew_cask:
    name:
      - cheatsheet
      - ghostty
      - iterm2
    state: absent
  ignore_errors: true
