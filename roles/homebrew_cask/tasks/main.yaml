- name: upgrade all casks
  community.general.homebrew_cask:
    upgrade_all: true
  ignore_errors: true

- name: Add clicklight tap
  community.general.homebrew_tap:
    name: aurorascharff/clicklight
    url: https://github.com/aurorascharff/ClickLight

- name: Add cmux tap
  community.general.homebrew_tap:
    name: manaflow-ai/cmux

  # https://formulae.brew.sh/cask/
- name: install homebrew cask packages
  community.general.homebrew_cask:
    name:
      - 1password
      - brave-browser
      - claude
      - claude-code
      - aurorascharff/clicklight/clicklight
      - clipy
      - cmux
      # - codex
      - github
      - google-chrome
      - google-cloud-sdk
      # - logi-options+
      - raycast
      - slack
      - visual-studio-code

- name: uninstall homebrew cask packages
  community.general.homebrew_cask:
    name:
      - cheatsheet
      - codex
      - ghostty
      - iterm2
    state: absent
  ignore_errors: true
