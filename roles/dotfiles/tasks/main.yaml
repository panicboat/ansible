---
- name: Clone or update dotfiles repository
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ dotfiles_repo_local_destination }}"
    version: "{{ dotfiles_repo_version }}"
    accept_hostkey: true

- name: Find all dotfiles
  ansible.builtin.shell: >
    cd {{ dotfiles_repo_local_destination }} && find . -type f
    -not -path '*/\.git/*'
    {% for exclude in dotfiles_exclude %}
    -not -name {{ exclude | quote }}
    {% endfor %}
    | sed 's|^\./||'
  register: dotfiles_found
  changed_when: false

- name: Create parent directories
  ansible.builtin.file:
    path: "~/{{ item | dirname }}"
    state: directory
  with_items: "{{ dotfiles_found.stdout_lines }}"
  when: item | dirname | length > 0

- name: Set dotfiles_files fact
  ansible.builtin.set_fact:
    dotfiles_files: "{{ dotfiles_found.stdout_lines }}"

- name: Find files in executable directories
  ansible.builtin.find:
    paths: "{{ dotfiles_repo_local_destination }}/{{ item }}"
    recurse: true
    file_type: file
  with_items: "{{ dotfiles_executable_dirs }}"
  register: dotfiles_executable_found

- name: Ensure executable permissions on scripts
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "0755"
  loop: "{{ dotfiles_executable_found.results | map(attribute='files') | flatten }}"
  loop_control:
    label: "{{ item.path }}"
