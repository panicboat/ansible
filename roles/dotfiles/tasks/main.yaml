---
- name: Check if dotfiles repository exists
  ansible.builtin.stat:
    path: ~/dotfiles
  register: dotfiles_dir

- name: Clone dotfiles repository
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: ~/dotfiles
    version: "{{ dotfiles_repo_version }}"
    accept_hostkey: true
  when: not dotfiles_dir.stat.exists

- name: Pull dotfiles repository
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: ~/dotfiles
    version: "{{ dotfiles_repo_version }}"
    accept_hostkey: true
  when: dotfiles_dir.stat.exists

- name: Find all dotfiles
  ansible.builtin.shell: >
    find ~/dotfiles -type f
    -not -path '*/\.git/*'
    {% for exclude in dotfiles_exclude %}
    -not -name '{{ exclude }}'
    {% endfor %}
    | sed 's|^.*/dotfiles/||'
  register: dotfiles_found
  changed_when: false

- name: Create parent directories
  ansible.builtin.file:
    path: "~/{{ item | dirname }}"
    state: directory
  with_items: "{{ dotfiles_found.stdout_lines }}"
  when: item | dirname | length > 0

- name: Set dotfiles_files fact
  ansible.builtin.set_fact:
    dotfiles_files: "{{ dotfiles_found.stdout_lines }}"
