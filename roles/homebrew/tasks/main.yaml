- name: update homebrew
  community.general.homebrew:
    update_homebrew: true
  ignore_errors: true

- name: upgrade homebrew
  community.general.homebrew:
    upgrade_all: true
  ignore_errors: true

- name: Add fluxcd tap
  community.general.homebrew_tap:
    name: fluxcd/tap

- name: install homebrew packages
  community.general.homebrew:
    name:
      - act                     # Run GitHub Actions locally
      - argo                    # CLI client for Argo Workflows
      - aqua                    # Declarative CLI tool version manager
      - awscli                  # AWS command-line interface
      - bat                     # cat replacement with syntax highlighting
      - buf                     # Build and lint tool for Protocol Buffers
      - cilium-cli              # CLI for managing Cilium network policies on Kubernetes
      - colima                  # Lightweight container runtime for macOS
      - docker                  # Container management CLI
      - docker-compose          # Define and run multi-container applications
      - eza                     # Modern replacement for ls
      - fluxcd/tap/flux         # GitOps continuous delivery tool for Kubernetes
      - gh                      # GitHub CLI
      - git                     # Version control system
      - goenv                   # Go version manager
      - helm                    # Kubernetes package manager
      - helmfile                # Declarative Helm chart deployment manager
      - jnv                     # Interactive JSON viewer and filter
      - jq                      # Command-line JSON processor
      - k3d                     # Run lightweight Kubernetes clusters on Docker
      - k9s                     # TUI for managing Kubernetes clusters
      - kubectl                 # CLI for Kubernetes cluster operations
      - kustomize               # Kubernetes manifest customization tool
      - mas                     # Mac App Store CLI
      - nodenv                  # Node.js version manager
      - opentofu                # Open-source Terraform-compatible IaC tool
      - peco                    # Interactive filtering tool
      - postgresql              # Relational database
      - pyenv                   # Python version manager
      - shellcheck              # Static analysis tool for shell scripts
      - starship                # Cross-shell prompt customization tool
      - tfenv                   # Terraform version manager
      - tmux                    # Terminal multiplexer
      - trash-cli               # Move files to trash instead of deleting
      - rbenv                   # Ruby version manager
      - yarn                    # Node.js package manager
      - yq                      # Command-line YAML processor
      - zsh-autosuggestions     # Fish-like autosuggestions for zsh
      - zsh-completions         # Additional completion definitions for zsh
      - zsh-syntax-highlighting # Fish-like syntax highlighting for zsh

- name: link docker
  command: brew link --overwrite docker
  changed_when: false

- name: link tfenv
  command: brew link --overwrite tfenv
  changed_when: false

- name: uninstall homebrew packages
  community.general.homebrew:
    name: []
    state: absent
  ignore_errors: true
